# fly.toml app configuration file generated for clay-lhqtua on 2026-07-17T07:07:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'clay-lhqtua'
primary_region = 'ewr'

[build]

[env]
  PORT = '8080'
  STATIC_DIR = 'packages/shell/dist'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
